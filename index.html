<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DA HOP Industrial Monitoring Platform</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0052FF',
                            lightblue: '#E5F0FF',
                            green: '#00C853',
                            lightgreen: '#E5F9ED',
                            orange: '#FF9100',
                            dark: '#0F172A',
                            gray: '#64748B'
                        }
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
                        'widget': '0 4px 20px 0 rgba(0, 0, 0, 0.05)',
                        'neon-green': '0 0 15px rgba(0, 200, 83, 0.5)',
                        'neon-orange': '0 0 20px rgba(255, 145, 0, 0.6)',
                        'neon-red': '0 0 25px rgba(239, 68, 68, 0.8)'
                    },
                    animation: {
                        'flow-traffic': 'flow 3s linear infinite',
                        'dash-flow': 'dash 2s linear infinite'
                    },
                    keyframes: {
                        flow: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100%)' }
                        },
                        dash: {
                            'to': { strokeDashoffset: '-20' }
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            /* Hình nền kiến trúc/đô thị sáng màu tạo cảm giác hiện đại */
            background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #0F172A;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            background-color: #F1F5F9; /* Fallback */
        }
        
        /* Lớp phủ sáng để làm mờ hình nền, làm nổi bật nội dung */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(248, 250, 252, 0.88);
            z-index: -1;
        }

        /* Glassmorphism utility giống Voltera */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .glass-panel-solid {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(241, 245, 249, 1);
            box-shadow: 0 4px 24px -2px rgba(15, 23, 42, 0.04);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        /* Pulse dot for alerts */
        .pulse-dot {
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Digital Twin Map Specific Styles */
        .dt-plot {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .dt-plot:hover {
            transform: translateY(-4px) scale(1.02);
            z-index: 20;
        }
        
        /* Data Layers Visuals */
        .layer-power .dt-plot::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            z-index: 15;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.05) 0%, transparent 100%);
        }
        .layer-water .dt-plot::after {
            content: '';
            position: absolute;
            bottom: 0px; left: 10%; right: 10%; height: 4px;
            background-color: rgba(6, 182, 212, 0.9);
            border-radius: 4px 4px 0 0;
            z-index: 20;
        }
        .layer-traffic .dt-map-grid {
            gap: 20px; /* Widen roads when traffic is on */
        }
        .traffic-particle {
            position: absolute;
            width: 6px; height: 6px;
            background: #F97316;
            border-radius: 50%;
            box-shadow: 0 0 10px #F97316;
            animation: flow-traffic 4s linear infinite;
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div id="root"></div>

    <script type="text/babel">
        // --- UTILS & MICRO COMPONENTS ---
        const Icon = ({ name, size = 20, className = '', color = 'currentColor', strokeWidth = 1.5 }) => {
            const iconHtml = lucide.icons[name]?.toSvg({ width: size, height: size, class: className, stroke: color, 'stroke-width': strokeWidth });
            return iconHtml ? <span dangerouslySetInnerHTML={{ __html: iconHtml }} /> : null;
        };

        const Card = ({ children, className = '', title, subtitle, action, type = 'solid', icon }) => {
            const baseClass = type === 'solid' ? 'glass-panel-solid' : 'glass-panel';
            return (
                <div className={`${baseClass} rounded-3xl p-6 transition-all hover:shadow-lg flex flex-col ${className}`}>
                    {(title || action) && (
                        <div className="flex justify-between items-start mb-5 pb-4 border-b border-slate-100/50 shrink-0">
                            <div className="flex items-center gap-3">
                                {icon && <div className="p-2 bg-slate-100 rounded-xl text-brand-blue"><Icon name={icon} size={20} strokeWidth={2} /></div>}
                                <div>
                                    {title && <h3 className="font-bold text-slate-800 text-lg leading-tight">{title}</h3>}
                                    {subtitle && <p className="text-xs font-semibold text-slate-500 mt-1 uppercase tracking-wider">{subtitle}</p>}
                                </div>
                            </div>
                            {action}
                        </div>
                    )}
                    <div className="flex-1 flex flex-col min-h-0">
                        {children}
                    </div>
                </div>
            );
        };

        const StatusBadge = ({ status, text, icon, className="" }) => {
            const styles = {
                active: 'bg-brand-lightgreen text-brand-green border-brand-green/20',
                warning: 'bg-orange-50 text-brand-orange border-brand-orange/20',
                error: 'bg-red-50 text-red-600 border-red-200',
                info: 'bg-brand-lightblue text-brand-blue border-brand-blue/20',
                neutral: 'bg-slate-100 text-slate-600 border-slate-200'
            };
            return (
                <span className={`px-3 py-1.5 text-[11px] uppercase tracking-wider font-bold border rounded-full flex items-center gap-1.5 w-fit ${styles[status]} ${className}`}>
                    {icon && <Icon name={icon} size={12} strokeWidth={2.5} />}
                    {text}
                </span>
            );
        };

        const AlertBox = ({ type = 'warning', title, desc, actionText }) => {
            const styles = {
                warning: 'bg-orange-50 border-orange-200 text-brand-orange',
                error: 'bg-red-50 border-red-200 text-red-600',
                info: 'bg-blue-50 border-blue-200 text-brand-blue'
            };
            const iconMap = { warning: 'alert-triangle', error: 'octagon-alert', info: 'info' };
            return (
                <div className={`p-3 rounded-2xl border flex items-start gap-3 ${styles[type]}`}>
                    <div className="mt-0.5"><Icon name={iconMap[type]} size={18} /></div>
                    <div className="flex-1">
                        <h4 className="text-sm font-bold">{title}</h4>
                        <p className="text-xs mt-1 opacity-80 leading-relaxed">{desc}</p>
                    </div>
                    {actionText && <button className="text-xs font-bold underline underline-offset-2 whitespace-nowrap">{actionText}</button>}
                </div>
            );
        };

        // Biểu đồ bán nguyệt (Gauge) phong cách Voltera
        const GaugeChart = ({ value, max = 100, label, suffix = "%", color = "#0052FF" }) => {
            const radius = 40;
            const circumference = Math.PI * radius;
            const strokeDashoffset = circumference - (value / max) * circumference;
            return (
                <div className="flex flex-col items-center justify-center relative">
                    <svg viewBox="0 0 100 55" className="w-full max-w-[120px] drop-shadow-sm">
                        <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#F1F5F9" strokeWidth="8" strokeLinecap="round" />
                        <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke={color} strokeWidth="8" strokeLinecap="round" 
                              strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} 
                              style={{ transition: 'stroke-dashoffset 1.5s ease-in-out' }} />
                    </svg>
                    <div className="absolute top-[45%] left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center w-full">
                        <span className="text-2xl font-extrabold text-slate-800">{value}</span>
                        <span className="text-xs font-bold text-slate-500 ml-0.5">{suffix}</span>
                    </div>
                    {label && <div className="text-[10px] font-bold text-slate-400 mt-1 text-center uppercase tracking-wider leading-tight">{label}</div>}
                </div>
            );
        };

        const SimpleProgressBar = ({ label, value, max = 100, colorClass = 'bg-brand-blue', suffix = '%' }) => (
            <div className="w-full mb-3 last:mb-0">
                <div className="flex justify-between text-xs mb-1.5">
                    <span className="text-slate-600 font-semibold">{label}</span>
                    <span className="font-bold text-slate-800">{value}{suffix}</span>
                </div>
                <div className="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                    <div className={`${colorClass} h-1.5 rounded-full`} style={{ width: `${(value/max)*100}%` }}></div>
                </div>
            </div>
        );

        const MetricRow = ({ label, value, subValue, highlight = false, icon }) => (
            <div className="flex justify-between items-center py-2.5 border-b border-slate-50 last:border-0">
                <div className="flex items-center gap-2">
                    {icon && <Icon name={icon} size={14} className="text-slate-400" />}
                    <span className="text-sm font-medium text-slate-600">{label}</span>
                </div>
                <div className="text-right">
                    <span className={`text-sm font-bold ${highlight ? 'text-brand-blue' : 'text-slate-900'}`}>{value}</span>
                    {subValue && <span className="text-[10px] text-slate-400 ml-1.5 font-semibold bg-slate-100 px-1.5 py-0.5 rounded">{subValue}</span>}
                </div>
            </div>
        );


        // --- DATA MOCK CHO DIGITAL TWIN ---
        const factoryImages = [
            'https://images.unsplash.com/photo-1581094288338-2314dddb7ece?auto=format&fit=crop&w=300&q=80',
            'https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?auto=format&fit=crop&w=300&q=80',
            'https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&w=300&q=80',
            'https://images.unsplash.com/photo-1565891741441-64926e441838?auto=format&fit=crop&w=300&q=80',
            'https://images.unsplash.com/photo-1513828583688-c52646db42da?auto=format&fit=crop&w=300&q=80',
            'https://images.unsplash.com/photo-1496247749665-49cf5b1022e9?auto=format&fit=crop&w=300&q=80'
        ];

        const generateTenants = () => {
            return Array.from({ length: 30 }, (_, i) => {
                const id = i + 1;
                let status = 'normal'; // normal, warning, critical, empty
                let name = `Nhà máy ${id}`;
                let alertMsg = '';
                let type = 'Electronics';
                let eui = Math.floor(Math.random() * 40) + 80; // 80 - 120
                let image = factoryImages[i % factoryImages.length];

                if ([7, 14, 22].includes(id)) { 
                    status = 'warning'; 
                    alertMsg = 'Cảnh báo ngưỡng tiêu thụ năng lượng vượt chuẩn ASHRAE.'; 
                    name = `Tập đoàn Tech ${id}`;
                    eui = 145;
                } else if ([4, 19].includes(id)) { 
                    status = 'critical'; 
                    alertMsg = 'Vi phạm an toàn PCCC / Rò rỉ nước thải chưa xử lý.'; 
                    name = `Heavy Industry ${id}`;
                    type = 'Manufacturing';
                    eui = 180;
                } else if ([12, 25, 28, 29, 30].includes(id)) { 
                    status = 'empty'; 
                    name = 'Đang xây dựng / Trống'; 
                    type = 'N/A';
                    eui = 0;
                    image = '';
                } else { 
                    name = `Eco Factory ${id}`; 
                    if(id % 3 === 0) type = 'Logistics';
                }

                return { 
                    id: `T${id.toString().padStart(2, '0')}`, 
                    name, status, alertMsg, type, eui, image,
                    water: status === 'empty' ? 0 : Math.floor(Math.random() * 2000) + 500,
                    workers: status === 'empty' ? 0 : Math.floor(Math.random() * 400) + 50,
                };
            });
        };
        const mockTenants = generateTenants();

        // Data Mock cho Hạ tầng Tiện ích
        const mockUtilities = [
            {
                id: 'U01',
                name: 'Trạm Điện & Solar',
                type: 'Utility',
                status: 'normal',
                icon: 'zap',
                image: 'https://images.unsplash.com/photo-1509391366360-2e959784a276?auto=format&fit=crop&w=300&q=80',
                metrics: [
                    { label: 'Công suất tải', value: '45.2', unit: 'MW' },
                    { label: 'Năng lượng mặt trời', value: '12.5', unit: 'MW' },
                    { label: 'Dung lượng BESS', value: '85', unit: '%' }
                ]
            },
            {
                id: 'U02',
                name: 'Nhà máy Cấp Nước',
                type: 'Utility',
                status: 'normal',
                icon: 'droplets',
                image: 'https://images.unsplash.com/photo-1551244072-5d12893278ab?auto=format&fit=crop&w=300&q=80',
                metrics: [
                    { label: 'Lưu lượng cấp', value: '5,000', unit: 'm³/ngày' },
                    { label: 'Áp suất mạngưới', value: '4.2', unit: 'bar' },
                    { label: 'Độ đục (NTU)', value: '< 1.0', unit: '(Đạt chuẩn)' }
                ]
            },
            {
                id: 'U03',
                name: 'Trạm XL Nước Thải',
                type: 'Utility',
                status: 'warning',
                icon: 'recycle',
                alertMsg: 'Nồng độ COD đầu vào tăng cao, hệ thống đang kích hoạt tăng cường vi sinh.',
                image: 'https://images.unsplash.com/photo-1518623000676-e26dd9c9d5ee?auto=format&fit=crop&w=300&q=80',
                metrics: [
                    { label: 'Lưu lượng xử lý', value: '4,200', unit: 'm³/ngày' },
                    { label: 'Chỉ số COD đầu ra', value: '45', unit: 'mg/L (Tốt)' },
                    { label: 'Tỷ lệ Tái sử dụng', value: '30', unit: '%' }
                ]
            }
        ];

        // --- COMPONENT POPUP CHI TIẾT TỪNG NHÀ MÁY ---
        const TenantDetailModal = ({ tenant, onClose }) => {
            if (!tenant) return null;
            
            // Mock data chuyên sâu theo yêu cầu
            const detail = {
                energy: { kwh: tenant.type==='Utility'?'125,000':'45,200', peak: '1.5 MW (14:00)', renew: '15%', ghg: '125' },
                water: { input: tenant.water || '1,200', ph: '7.2', cod: '45', bod: '20', tss: '15', amoni: '1.5' },
                waste: { domestic: '4.5', industrial: '12', hazardous: '0.8', note: 'Đơn vị xử lý: URENCO' },
                ops: { sla: '99.9%', log_count: '42', log_time: '1h 15m', maint: 'Trạm biến áp nội bộ Tốt' },
                social: { total: tenant.workers || 350, local: '85%', expat: '15%', turnover: '1.2%', lti: '25,000', near_miss: '0', pccc: 'Kết nối TT BQL Sẵn sàng' },
                gov: { certs: ['ISO 9001', 'ISO 14001', 'ISO 45001'], finance: 'Đã hoàn tất thanh toán', audit: '94/100' },
                rank: { score: '88/100', pos: '#5 / 30' }
            };

            if (tenant.status === 'warning') {
                detail.energy.kwh = '58,000'; detail.water.cod = '110'; detail.social.near_miss = '3'; detail.rank.pos = '#22 / 30'; detail.gov.audit = '75/100'; detail.rank.score = '65/100';
            } else if (tenant.status === 'critical') {
                detail.ops.sla = '95.5%'; detail.social.pccc = 'Lỗi mất tín hiệu Zone B'; detail.water.ph = '5.0'; detail.gov.finance = 'Nợ phí dịch vụ 1 tháng'; detail.ops.maint = 'Sự cố Hố ga thoát nước';
            }

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 bg-slate-900/60 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                    <div className="bg-white w-full max-w-6xl h-[95vh] rounded-[2rem] shadow-2xl flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                        {/* Header */}
                        <div className="flex justify-between items-center p-6 border-b border-slate-100 bg-slate-50 shrink-0">
                            <div>
                                <div className="flex items-center gap-3">
                                    <h2 className="text-2xl font-extrabold text-slate-900">{tenant.name}</h2>
                                    <StatusBadge status={tenant.status === 'normal' ? 'active' : tenant.status === 'warning' ? 'warning' : tenant.status === 'critical' ? 'error' : 'neutral'} text={tenant.status === 'normal' ? 'Hoạt động tốt' : tenant.status === 'warning' ? 'Cảnh báo' : tenant.status === 'critical' ? 'Sự cố' : 'Đang XD/Trống'} />
                                </div>
                                <p className="text-sm font-semibold text-slate-500 mt-1">Dashboard Chuyên sâu ESG & Vận hành - {tenant.type==='Utility'?'Hạ Tầng Trung Tâm':`Lô ${tenant.id}`}</p>
                            </div>
                            <button onClick={onClose} className="p-2 bg-white border border-slate-200 hover:bg-slate-100 rounded-full transition-colors"><Icon name="x" size={24} className="text-slate-500" /></button>
                        </div>
                        
                        {/* Scrollable Content */}
                        <div className="flex-1 overflow-y-auto p-6 bg-slate-50/50">
                            {tenant.alertMsg && (
                                <div className="mb-6"><AlertBox type={tenant.status === 'warning' ? 'warning' : 'error'} title="Phát hiện sự cố cần lưu ý" desc={tenant.alertMsg} actionText="Xử lý ngay" /></div>
                            )}

                            {/* A. Phân hệ Quản trị Môi trường */}
                            <div className="mb-8">
                                <h3 className="text-lg font-extrabold text-slate-800 mb-4 flex items-center gap-2"><div className="p-1.5 bg-brand-lightgreen rounded-lg"><Icon name="leaf" size={18} className="text-brand-green"/></div> A. Phân hệ Quản trị Môi trường (The "E" in ESG)</h3>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
                                    <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                                        <h4 className="text-[11px] font-extrabold text-slate-500 uppercase tracking-wider mb-3">Tiêu thụ Năng lượng</h4>
                                        <MetricRow label="Tổng điện năng (Tháng)" value={detail.energy.kwh} subValue="kWh" highlight />
                                        <MetricRow label="Biểu đồ Phụ tải đỉnh (Peak)" value={detail.energy.peak} />
                                        <MetricRow label="Tỷ lệ NL Tái tạo (Solar Roof)" value={detail.energy.renew} />
                                        <MetricRow label="Phát thải KNK (Scope 1, 2)" value={detail.energy.ghg} subValue="tCO2e" />
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col">
                                        <h4 className="text-[11px] font-extrabold text-slate-500 uppercase tracking-wider mb-3">Quản lý Nguồn nước</h4>
                                        <MetricRow label="Nước sạch đầu vào" value={detail.water.input} subValue="m³" highlight />
                                        <div className="mt-auto pt-3 border-t border-slate-100">
                                            <p className="text-[10px] font-extrabold text-brand-blue uppercase tracking-wider mb-2 text-center bg-brand-lightblue/50 py-1 rounded">Chất lượng Nước thải đầu ra (Real-time)</p>
                                            <div className="grid grid-cols-3 gap-2 text-center text-xs font-bold">
                                                <div className="bg-slate-50 p-2 rounded-xl border border-slate-100">pH<br/><span className={`text-base ${tenant.status==='critical'?'text-red-500':'text-brand-green'}`}>{detail.water.ph}</span></div>
                                                <div className="bg-slate-50 p-2 rounded-xl border border-slate-100">COD<br/><span className={`text-base ${tenant.status==='warning'?'text-brand-orange':'text-brand-green'}`}>{detail.water.cod}</span></div>
                                                <div className="bg-slate-50 p-2 rounded-xl border border-slate-100">BOD<br/><span className="text-base text-brand-green">{detail.water.bod}</span></div>
                                                <div className="bg-slate-50 p-2 rounded-xl border border-slate-100">TSS<br/><span className="text-base text-brand-green">{detail.water.tss}</span></div>
                                                <div className="bg-slate-50 p-2 rounded-xl border border-slate-100 col-span-2">Amoni<br/><span className="text-base text-brand-green">{detail.water.amoni}</span></div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col">
                                        <h4 className="text-[11px] font-extrabold text-slate-500 uppercase tracking-wider mb-3">Quản lý Rác thải (Tháng này)</h4>
                                        <MetricRow label="Rác sinh hoạt" value={detail.waste.domestic} subValue="Tấn" />
                                        <MetricRow label="Rác công nghiệp" value={detail.waste.industrial} subValue="Tấn" />
                                        <MetricRow label="Rác nguy hại" value={detail.waste.hazardous} subValue="Tấn" highlight />
                                        <div className="mt-auto bg-slate-50 border border-slate-100 p-3 rounded-xl text-xs font-medium text-slate-600 flex items-start gap-2">
                                            <Icon name="file-check-2" size={16} className="text-brand-blue shrink-0 mt-0.5" />

        // 4. Digital Twin Map View
        const DigitalTwinView = () => {
            const [activeLayers, setActiveLayers] = React.useState({ power: true, water: false, traffic: true });
            const [selectedTenant, setSelectedTenant] = React.useState(null); // Không select mặc định để trống popup
            const [isModalOpen, setIsModalOpen] = React.useState(false); // State mở Modal

            const toggleLayer = (layer) => {
                setActiveLayers(prev => ({ ...prev, [layer]: !prev[layer] }));
            };

            const getStatusStyles = (status) => {
                switch(status) {
                    case 'normal': return 'bg-white shadow-[0_4px_20px_rgba(0,0,0,0.06)] hover:shadow-[0_8px_25px_rgba(0,200,83,0.25)] text-[#00C853]';
                    case 'warning': return 'bg-white shadow-[0_4px_20px_rgba(0,0,0,0.06)] hover:shadow-[0_8px_25px_rgba(255,145,0,0.3)] text-[#FF9100]';
                    case 'critical': return 'bg-white shadow-[0_4px_20px_rgba(239,68,68,0.2)] pulse-dot text-red-500';
                    case 'empty': return 'bg-slate-50 shadow-sm border border-slate-200 text-slate-500';
                    default: return 'bg-white shadow-md';
                }
            };

            const getSelectionStyle = (status) => {
                // Thay vì border/ring, dùng shadow tinh tế để loại bỏ đường viền theo yêu cầu
                switch(status) {
                    case 'normal': return 'shadow-[0_0_25px_rgba(0,200,83,0.5)] scale-[1.05] z-30';
                    case 'warning': return 'shadow-[0_0_25px_rgba(255,145,0,0.5)] scale-[1.05] z-30';
                    case 'critical': return 'shadow-[0_0_30px_rgba(239,68,68,0.7)] scale-[1.05] z-30';
                    case 'empty': return 'shadow-[0_0_20px_rgba(0,0,0,0.15)] scale-[1.05] z-30';
                    default: return 'shadow-[0_0_20px_rgba(0,0,0,0.1)] scale-[1.05] z-30';
                }
            };

            const handlePlotClick = (tenant) => {
                if(tenant.status === 'empty') return; // Không mở modal cho đất trống
                setSelectedTenant(tenant);
                setIsModalOpen(true);
            };

            return (
                <div className="space-y-6 animate-fade-in pb-10 h-full flex flex-col relative">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-2">
                        <div>
                            <StatusBadge status="active" text="Hệ thống Live" icon="radio" className="mb-2" />
                            <h2 className="text-3xl font-extrabold text-slate-900">Digital Twin & Interactive Map</h2>
                            <p className="text-slate-500 font-medium mt-1">Bản sao số thời gian thực - Trung tâm điều hành sống của Khu công nghiệp.</p>
                        </div>
                    </div>

                    <div className="flex flex-col lg:flex-row gap-6 items-start">
                        
                        {/* LEFT: MAP AREA */}
                        <div className={`flex-[2.5] rounded-3xl relative p-8 flex flex-col w-full bg-white border border-slate-200 shadow-[0_8px_30px_rgba(0,0,0,0.04)] ${activeLayers.traffic ? 'layer-traffic' : ''} ${activeLayers.power ? 'layer-power' : ''} ${activeLayers.water ? 'layer-water' : ''}`}>
                            {/* Decorative Grid Lines */}
                            <div className="absolute inset-0 z-0 pointer-events-none opacity-20">
                                <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                                    <defs>
                                        <pattern id="radarGrid" width="60" height="60" patternUnits="userSpaceOnUse">
                                            <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#E2E8F0" strokeWidth="1"/>
                                        </pattern>
                                    </defs>
                                    <rect width="100%" height="100%" fill="url(#radarGrid)" />
                                </svg>
                            </div>

                            {/* Map Content */}
                            <div className="relative z-10 flex-1 flex flex-col h-full">
                                <div className="flex justify-between items-center mb-6 shrink-0">
                                    <h3 className="text-slate-800 font-bold tracking-widest uppercase text-sm flex items-center gap-2">
                                        <Icon name="map" size={16} className="text-brand-blue" /> Layout KCN Toàn cảnh
                                    </h3>
                                    <div className="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-600 bg-slate-50 p-2 rounded-lg border border-slate-200 backdrop-blur-sm">
                                        <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full bg-[#00C853] shadow-[0_0_5px_#00C853]"></div> Bình thường</div>
                                        <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full bg-[#FF9100] shadow-[0_0_5px_#FF9100]"></div> Cảnh báo</div>
                                        <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full bg-red-500 pulse-dot"></div> Sự cố</div>
                                        <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 bg-slate-300 rounded-sm"></div> Đang XD/Trống</div>
                                    </div>
                                </div>

                                {/* Dynamic Grid representing 30 plots */}
                                <div className="w-full grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 gap-4 dt-map-grid relative mb-6">
                                    {/* Traffic Simulation Overlays */}
                                    {activeLayers.traffic && (
                                        <div className="absolute inset-0 pointer-events-none z-0 overflow-hidden">
                                            <div className="traffic-particle left-[16.5%] top-0"></div>
                                            <div className="traffic-particle left-[33%] top-0" style={{ animationDelay: '1s' }}></div>
                                            <div className="traffic-particle left-[50%] top-0" style={{ animationDelay: '2.5s' }}></div>
                                            <div className="traffic-particle left-[66.5%] top-0" style={{ animationDelay: '0.5s' }}></div>
                                            <div className="traffic-particle left-[83%] top-0" style={{ animationDelay: '1.8s' }}></div>
                                        </div>
                                    )}

                                    {mockTenants.map(tenant => (
                                        <div 
                                            key={tenant.id} 
                                            onClick={() => handlePlotClick(tenant)}
                                            className={`dt-plot cursor-pointer rounded-xl flex flex-col overflow-hidden min-h-[90px] border-none ${getStatusStyles(tenant.status)} ${selectedTenant?.id === tenant.id ? getSelectionStyle(tenant.status) : ''}`}
                                        >
                                            {/* Image Area */}
                                            <div className="relative h-16 w-full bg-slate-100 shrink-0">
                                                {tenant.status !== 'empty' ? (
                                                    <img src={tenant.image} className="absolute inset-0 w-full h-full object-cover" alt={tenant.name} />
                                                ) : (
                                                    <div className="absolute inset-0 flex items-center justify-center">
                                                        <Icon name="building" size={16} className="text-slate-400" />
                                                    </div>
                                                )}
                                                
                                                <div className="absolute top-1.5 left-1.5 px-1.5 py-0.5 rounded bg-slate-900/80 backdrop-blur-sm text-[9px] font-extrabold text-white z-10 shadow-sm">
                                                    {tenant.id}
                                                </div>
                                                
                                                {/* Extra visuals inside plot if layer active */}
                                                {activeLayers.power && tenant.status !== 'empty' && (
                                                    <div className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-blue-400 shadow-[0_0_8px_#60A5FA] z-20"></div>
                                                )}
                                            </div>
                                            
                                            {/* Title Area (White Box) */}
                                            <div className="bg-white p-1.5 flex items-center justify-center flex-1 min-h-[32px] relative z-10 border-t border-slate-100">
                                                <span className="text-[9px] font-extrabold text-slate-800 leading-tight text-center line-clamp-2">
                                                    {tenant.name}
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Core Utilities Row (3 Plants) */}
                                <div className="mt-auto pt-6 border-t border-slate-200 shrink-0">
                                    <h4 className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-4">Hạ tầng Trung tâm (Core Utilities)</h4>
                                    <div className="grid grid-cols-3 gap-6">
                                        {mockUtilities.map(utility => (
                                            <div 
                                                key={utility.id} 
                                                onClick={() => handlePlotClick(utility)}
                                                className={`dt-plot cursor-pointer rounded-xl flex flex-col overflow-hidden min-h-[100px] border-none ${getStatusStyles(utility.status)} ${selectedTenant?.id === utility.id ? getSelectionStyle(utility.status) : ''}`}
                                            >
                                                {/* Image Area */}
                                                <div className="relative h-20 w-full bg-slate-100 shrink-0">
                                                    <img src={utility.image} className="absolute inset-0 w-full h-full object-cover" alt={utility.name} />
                                                    <div className="absolute top-2 left-2 p-1.5 rounded-lg bg-white/90 backdrop-blur-sm z-10 shadow-sm border border-slate-100">
                                                        <Icon name={utility.icon} size={16} className={utility.status === 'warning' ? 'text-[#FF9100]' : 'text-brand-blue'} />
                                                    </div>
                                                    {/* Extra power visuals */}
                                                    {activeLayers.power && (
                                                        <div className="absolute top-2 right-2 w-2.5 h-2.5 rounded-full bg-blue-400 shadow-[0_0_8px_#60A5FA] z-20"></div>
                                                    )}
                                                </div>
                                                
                                                {/* Title Area (White Box) */}
                                                <div className="bg-white p-2 flex items-center justify-center flex-1 relative z-10 border-t border-slate-100">
                                                    <span className="text-xs font-extrabold text-slate-800 leading-tight text-center">
                                                        {utility.name}
                                                    </span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* RIGHT: CONTROL PANEL */}
                        <div className="flex-[1] flex flex-col gap-6 sticky top-28 self-start">
                            
                            {/* Layers Control */}
                            <Card title="Lớp Dữ Liệu (Data Layers)" icon="layers" className="shrink-0">
                                <div className="space-y-3">
                                    <label className="flex items-center justify-between p-3 rounded-xl border cursor-pointer transition-all hover:bg-slate-50 border-slate-200">
                                        <div className="flex items-center gap-2">
                                            <Icon name="zap" size={16} className={activeLayers.power ? 'text-brand-blue' : 'text-slate-400'} />
                                            <span className="text-sm font-bold text-slate-700">Mạng lưới Điện năng</span>
                                        </div>
                                        <div className={`w-10 h-5 rounded-full relative transition-colors ${activeLayers.power ? 'bg-brand-blue' : 'bg-slate-300'}`}>
                                            <div className={`w-4 h-4 bg-white rounded-full absolute top-0.5 transition-transform ${activeLayers.power ? 'translate-x-5' : 'translate-x-0.5'}`}></div>
                                        </div>
                                        <input type="checkbox" className="hidden" checked={activeLayers.power} onChange={() => toggleLayer('power')} />
                                    </label>

                                    <label className="flex items-center justify-between p-3 rounded-xl border cursor-pointer transition-all hover:bg-slate-50 border-slate-200">
                                        <div className="flex items-center gap-2">
                                            <Icon name="droplets" size={16} className={activeLayers.water ? 'text-cyan-500' : 'text-slate-400'} />
                                            <span className="text-sm font-bold text-slate-700">Đường ống Nước thải</span>
                                        </div>
                                        <div className={`w-10 h-5 rounded-full relative transition-colors ${activeLayers.water ? 'bg-cyan-500' : 'bg-slate-300'}`}>
                                            <div className={`w-4 h-4 bg-white rounded-full absolute top-0.5 transition-transform ${activeLayers.water ? 'translate-x-5' : 'translate-x-0.5'}`}></div>
                                        </div>
                                        <input type="checkbox" className="hidden" checked={activeLayers.water} onChange={() => toggleLayer('water')} />
                                    </label>

                                    <label className="flex items-center justify-between p-3 rounded-xl border cursor-pointer transition-all hover:bg-slate-50 border-slate-200">
                                        <div className="flex items-center gap-2">
                                            <Icon name="truck" size={16} className={activeLayers.traffic ? 'text-brand-orange' : 'text-slate-400'} />
                                            <span className="text-sm font-bold text-slate-700">Lưu lượng Giao thông</span>
                                        </div>
                                        <div className={`w-10 h-5 rounded-full relative transition-colors ${activeLayers.traffic ? 'bg-brand-orange' : 'bg-slate-300'}`}>
                                            <div className={`w-4 h-4 bg-white rounded-full absolute top-0.5 transition-transform ${activeLayers.traffic ? 'translate-x-5' : 'translate-x-0.5'}`}></div>
                                        </div>
                                        <input type="checkbox" className="hidden" checked={activeLayers.traffic} onChange={() => toggleLayer('traffic')} />
                                    </label>
                                </div>
                            </Card>

                            {/* Tóm tắt tổng quan thay vì Chi tiết nhỏ */}
                            <Card title="Trạng thái Tổng quan" icon="activity" className="flex-1">
                                <div className="space-y-4 animate-fade-in flex flex-col h-full">
                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 flex items-center justify-between">
                                        <span className="text-sm font-bold text-slate-700">Hoạt động bình thường</span>
                                        <span className="text-lg font-extrabold text-brand-green">25/30</span>
                                    </div>
                                    <div className="bg-orange-50 p-4 rounded-xl border border-orange-100 flex items-center justify-between">
                                        <span className="text-sm font-bold text-orange-800">Cảnh báo ngưỡng (Warning)</span>
                                        <span className="text-lg font-extrabold text-brand-orange">3/30</span>
                                    </div>
                                    <div className="bg-red-50 p-4 rounded-xl border border-red-100 flex items-center justify-between">
                                        <span className="text-sm font-bold text-red-700">Sự cố nghiêm trọng (Critical)</span>
                                        <span className="text-lg font-extrabold text-red-600 pulse-dot rounded-full w-8 h-8 flex items-center justify-center bg-white shadow-sm">2</span>
                                    </div>
                                    
                                    <div className="mt-auto pt-4 border-t border-slate-200">
                                        <p className="text-xs font-semibold text-slate-500 text-center mb-3">
                                            <Icon name="mouse-pointer-click" size={14} className="inline mr-1 -mt-0.5"/>
                                            Bấm vào một phân khu trên bản đồ để xem Dashboard ESG chuyên sâu.
                                        </p>
                                    </div>
                                </div>
                            </Card>

                        </div>
                    </div>
                    
                    {/* Render Popup Modal nếu có */}
                    {isModalOpen && <TenantDetailModal tenant={selectedTenant} onClose={() => setIsModalOpen(false)} />}
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [activeTab, setActiveTab] = React.useState('twin');

            const renderContent = () => {
                switch(activeTab) {
                    case 'leed': return <LeedView />;
                    case 'unido': return <UnidoView />;
                    case 'tenant': return <TenantPortalView />;
                    case 'twin': return <DigitalTwinView />;
                    default: return <DigitalTwinView />;
                }
            };

            const navItems = [
                { id: 'twin', label: 'Digital Twin Map', icon: 'layers' },
                { id: 'leed', label: 'LEED Dashboard', icon: 'bar-chart-2' },
                { id: 'unido', label: 'UNIDO Matrix', icon: 'globe' },
                { id: 'tenant', label: 'Tenant Portal', icon: 'layout-dashboard' }
            ];

            return (
                <div className="min-h-screen flex relative z-10">
                    {/* Floating Sidebar */}
                    <div className="hidden md:block w-72 p-6 h-screen sticky top-0 shrink-0">
                        <aside className="w-full h-full glass-panel-solid rounded-3xl flex flex-col shadow-xl overflow-hidden">
                            <div className="p-6 border-b border-slate-100">
                                <h1 className="font-extrabold text-slate-900 flex items-center gap-3">
                                    <div className="flex flex-col">
                                        <span className="leading-tight text-xl">DA HOP</span>
                                        <span className="text-[10px] text-brand-blue uppercase tracking-wider mt-0.5 leading-tight">Industrial Monitoring Platform</span>
                                    </div>
                                </h1>
                            </div>
                            
                            <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                                <div className="text-xs font-extrabold text-slate-400 uppercase tracking-wider mb-4 px-4">Menu Chính</div>
                                {navItems.map(item => (
                                    <button
                                        key={item.id}
                                        onClick={() => setActiveTab(item.id)}
                                        className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl transition-all duration-200 text-sm font-bold ${
                                            activeTab === item.id 
                                            ? 'bg-slate-900 text-white shadow-md transform scale-[1.02]' 
                                            : 'text-slate-500 hover:text-slate-900 hover:bg-slate-100'
                                        }`}
                                    >
                                        <Icon name={item.icon} size={20} strokeWidth={activeTab === item.id ? 2.5 : 2} />
                                        {item.label}
                                    </button>
                                ))}
                            </nav>

                            <div className="p-6 m-4 bg-slate-50 rounded-2xl border border-slate-100 flex items-center gap-3 shrink-0">
                                <div className="w-10 h-10 rounded-full bg-brand-blue flex items-center justify-center text-white font-bold shadow-md shrink-0">
                                    AM
                                </div>
                                <div className="min-w-0">
                                    <p className="text-sm font-bold text-slate-900 truncate">Admin Manager</p>
                                    <p className="text-xs font-semibold text-slate-500 truncate">Ban Quản Lý</p>
                                </div>
                            </div>
                        </aside>
                    </div>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col min-h-screen min-w-0 overflow-hidden">
                        {/* Header */}
                        <header className="h-24 flex items-center justify-between px-6 md:px-10 sticky top-0 z-20 backdrop-blur-sm shrink-0">
                            <div className="flex items-center gap-4 w-full md:w-auto">
                                <button className="md:hidden p-2 bg-white rounded-xl shadow-sm text-slate-800 shrink-0">
                                    <Icon name="menu" />
                                </button>
                                <div className="relative w-full md:w-80 hidden md:block">
                                    <Icon name="search" className="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400" size={18} />
                                    <input 
                                        type="text" 
                                        placeholder="Tìm kiếm báo cáo, chỉ số..." 
                                        className="w-full glass-panel-solid border-none rounded-2xl pl-12 pr-4 py-3 text-sm font-semibold text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-blue shadow-sm"
                                    />
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-4 shrink-0">
                                <div className="hidden sm:flex items-center gap-2 px-4 py-2 bg-white rounded-full shadow-sm border border-slate-100">
                                    <span className="relative flex h-2.5 w-2.5">
                                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-green opacity-75"></span>
                                      <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-brand-green"></span>
                                    </span>
                                    <span className="text-xs font-bold text-slate-600 uppercase tracking-wide">Live Data</span>
                                </div>
                                <button className="relative p-3 bg-white rounded-xl text-slate-600 hover:text-slate-900 shadow-sm border border-slate-100 transition-colors">
                                    <Icon name="bell" size={20} />
                                    <span className="absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full"></span>
                                </button>
                                <button className="p-3 bg-white rounded-xl text-slate-600 hover:text-slate-900 shadow-sm border border-slate-100 transition-colors">
                                    <Icon name="settings" size={20} />
                                </button>
                            </div>
                        </header>

                        {/* Content Area */}
                        <div className="px-6 md:px-10 pt-4 flex-1 max-w-7xl mx-auto w-full">
                            {renderContent()}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
